name: AfroChain CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run protocol tests
        run: npm run test:protocol

      - name: Run SDK tests
        run: npm run test:sdk

      - name: Build wallet
        run: npm run build --workspace @afrochain/wallet

      - name: Build explorer
        run: npm run build --workspace @afrochain/explorer

      - name: Build dashboard
        run: npm run build --workspace @afrochain/dashboard

      - name: Export mobile wallet web bundle
        working-directory: apps/mobile-wallet
        run: npx expo export --platform web

      - name: Check repo boundaries
        run: npm run check:boundaries

